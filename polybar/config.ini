; #############################
; # Importing necessary files #
; #############################

include-file = ~/.config/polybar/modules.ini
include-file = ~/.config/polybar/bars.ini

; ############################
; # Polybar general settings #
; ############################

[settings]
screenchange-reload = true

; #################
; # Color setting #
; #################

[color]
background = ${xrdb:color0:#222}
background-alt = ${xrdb:color0:#222}

foreground = ${xrdb:color7:#222}
foreground-alt = ${xrdb:color8:#222}

primary = ${xrdb:color1:#222}
secondary = ${xrdb:color2:#222}

alert = ${xrdb:color3:#222}
transparent = #00000000
pink = ${xrdb:color1:#222}
blue = ${xrdb:color2:#222}
gray = ${xrdb:color8:#222}
purple = ${xrdb:color13:#222}
light-blue = ${xrdb:color4:#222}

; Configuration settings for polybar bar on EndeavourOS + BSPWM by github.com/gweebg and based off github.com/umgbhalla .
